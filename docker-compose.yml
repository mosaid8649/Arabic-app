services:
  arabic-app:
    build: .
    ports:
      - "8079:5000"
    depends_on:
      - mongo
      - mongo-express
    networks:
      - arabic-app-network
  mongo:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    networks:
      - arabic-app-network
    volumes:
      - mongo-data:/data/db  
  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_SERVER=mongo
    networks:
      - arabic-app-network
networks:
  arabic-app-network:
    driver: bridged
volumes:
   mongo-data: